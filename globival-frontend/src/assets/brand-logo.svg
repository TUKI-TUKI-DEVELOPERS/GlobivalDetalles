<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title>Globival &amp; Detalles Brand Mark</title>
  <desc>Simple brand mark with hearts and an envelope to match Globival &amp; Detalles identity.</desc>
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Envelope -->
  <g filter="url(#softShadow)" transform="translate(10,28)">
    <rect x="0" y="0" width="24" height="16" rx="2" ry="2" fill="#FDE68A" stroke="#EAB308" stroke-width="1"/>
    <path d="M0 0 L12 9 L24 0" fill="#FCD34D" stroke="#EAB308" stroke-width="1"/>
  </g>

  <!-- Hearts cluster -->
  <g filter="url(#softShadow)" transform="translate(32,10)">
    <path d="M8 6 C8 3.79 6.21 2 4 2 C2.9 2 1.9 2.45 1.17 3.17 C0.45 3.9 0 4.9 0 6 C0 9.31 3.42 11.5 5.66 13.2 C6.4 13.78 7.6 13.78 8.34 13.2 C10.58 11.5 14 9.31 14 6 C14 3.79 12.21 2 10 2 C8.9 2 7.9 2.45 7.17 3.17 C6.45 3.9 6 4.9 6 6 Z" fill="url(#heartGrad)"/>
    <path d="M18 0 C18 -2.21 16.21 -4 14 -4 C12.9 -4 11.9 -3.55 11.17 -2.83 C10.45 -2.1 10 -1.1 10 0 C10 3.31 13.42 5.5 15.66 7.2 C16.4 7.78 17.6 7.78 18.34 7.2 C20.58 5.5 24 3.31 24 0 C24 -2.21 22.21 -4 20 -4 C18.9 -4 17.9 -3.55 17.17 -2.83 C16.45 -2.1 16 -1.1 16 0 Z" fill="url(#heartGrad)"/>
  </g>

  <!-- Small penguin silhouette (minimal) -->
  <g transform="translate(6,14)">
    <circle cx="10" cy="16" r="8" fill="#111827"/>
    <ellipse cx="10" cy="23" rx="10" ry="7" fill="#111827"/>
    <circle cx="8" cy="15" r="1.2" fill="#F59E0B"/>
    <circle cx="12" cy="15" r="1.2" fill="#F59E0B"/>
    <circle cx="10" cy="17" r="1.4" fill="#F59E0B"/>
    <rect x="6" y="28" width="4" height="2" rx="1" fill="#F59E0B"/>
    <rect x="10" y="28" width="4" height="2" rx="1" fill="#F59E0B"/>
  </g>
</svg>