<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/src/assets/logo-1.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FF0000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Globival & Detalles" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Globival & Detalles: Catálogo de regalos y detalles personalizados. Encuentra productos únicos llenos de amor para toda ocasión." />
    <meta name="keywords" content="globival, detalles, regalos, catálogo, tienda, personalizados, globos, peluches, flores" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://globivaldetalles.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Globival & Detalles — Catálogo, Regalos y Detalles" />
    <meta property="og:description" content="Explora nuestro catálogo y descubre detalles y regalos personalizados para cada momento especial." />
    <meta property="og:site_name" content="Globival & Detalles" />
    <meta property="og:url" content="https://globivaldetalles.com/" />
    <meta property="og:image" content="/src/assets/logo-1.jpeg" />
    <meta property="og:locale" content="es_PE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Globival & Detalles — Catálogo, Regalos y Detalles" />
    <meta name="twitter:description" content="Detalles y regalos personalizados. Descubre nuestro catálogo online." />
    <meta name="twitter:image" content="/src/assets/logo-1.jpeg" />

    <!-- Navegación del sitio para SEO -->
    <link rel="prefetch" href="/catalogo" />
    <link rel="prefetch" href="/acerca-de" />
    <link rel="prefetch" href="/social" />

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://globivaldetalles.com/",
        "name": "Globival & Detalles",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://globivaldetalles.com/catalogo?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- JSON-LD: SiteNavigationElement -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SiteNavigationElement",
        "name": ["Catálogo", "Acerca de", "Social"],
        "url": [
          "https://globivaldetalles.com/catalogo",
          "https://globivaldetalles.com/acerca-de",
          "https://globivaldetalles.com/social"
        ]
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <title>Globival & Detalles | Catálogo de Regalos y Detalles</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
